name: Release Chiseled image

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'build/docker-site/**'
      - 'src/**'
      - 'build/build.sh'
  workflow_dispatch:

jobs:
  release-chiseled:
    name: Release: chiseled image build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.28
          run_install: false

      - name: Setup NodeJS
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "src/Articulate.Web/Client/.node-version"
          cache: "pnpm"
          cache-dependency-path: "src/Articulate.Web/Client/pnpm-lock.yaml"

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: |
            9.0.309
            10.0.201

      - name: Build package inputs
        env:
          RUN_TESTS: false
          PACK_SAMPLE_THEME: true
          ENABLE_CLIENT_BUILD: true
        run: bash ./build/build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build chiseled image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: chiseled
          push: false
          tags: articulate-chiseled:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report image size
        run: |
          size=$(docker image inspect --format '{{"{{.Size}}"}}' articulate-chiseled:${{ github.sha }})
          echo "$size" > image-size-bytes.txt
          echo "size_bytes=$size" >> $GITHUB_OUTPUT

      - name: Upload image-size artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: chiseled-image-size
          path: image-size-bytes.txt

      - name: Note
        run: |
          echo "This workflow builds the chiseled image. To push to a registry, configure docker/registry credentials and enable a push step."
