name: Chiseled image build & smoke

concurrency:
  group: ${{ github.ref }}-chiseled-image
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]
    paths:
      - 'Dockerfile'
      - 'build/docker-site/**'
      - 'src/**'
      - 'build/build.sh'
      - '.github/workflows/**'

jobs:
  build-and-smoke:
    if: github.event_name == 'workflow_dispatch' || contains(join(github.event.pull_request.labels.*.name, ','), 'chiseled')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.28
          run_install: false

      - name: Setup NodeJS
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "src/Articulate.Web/Client/.node-version"
          cache: "pnpm"
          cache-dependency-path: "src/Articulate.Web/Client/pnpm-lock.yaml"

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: |
            9.0.309
            10.0.201

      - name: Cache NuGet packages
        uses: actions/cache@v5.0.4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build package inputs
        env:
          RUN_TESTS: false
          PACK_SAMPLE_THEME: true
          ENABLE_CLIENT_BUILD: true
        run: bash ./build/build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build chiseled image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: chiseled
          push: false
          tags: articulate-chiseled:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report image size
        run: |
          size=$(docker image inspect --format '{{"{{.Size}}"}}' articulate-chiseled:${{ github.sha }})
          echo "$size" > image-size-bytes.txt
          echo "size_bytes=$size" >> $GITHUB_OUTPUT

      - name: Run dev/prod smoke path
        env:
          ARTICULATE_DEV_AUTOMATION_CLIENT_SECRET: dev-smoke-secret-0123456789abcdef
          AUTOPUBLISH_MODE: api
          RESET_DOCKER_VOLUMES: true
          IMAGE_TAG: articulate-chiseled:${{ github.sha }}
          UMBRACO_RUNTIME_MODE: BackofficeDevelopment
          UMBRACO_PUBLIC_HOST: https://localhost:18443
          UMBRACO_PUBLIC_URL: https://localhost:18443/
        run: |
          chmod +x build/docker-site/run-dev.sh build/docker-site/run-prod-smoke.sh
          ./build/docker-site/run-dev.sh
          UMBRACO_RUNTIME_MODE=Production ./build/docker-site/run-prod-smoke.sh

      - name: Collect smoke logs
        if: always()
        run: docker compose logs > docker-compose.log 2>&1 || true

      - name: Upload image-size artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: chiseled-image-size
          path: image-size-bytes.txt

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: chiseled-smoke-logs
          path: |
            docker-compose.log
