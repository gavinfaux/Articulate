name: Node.js CI

on:
  push:
    paths:
      - 'src/Articulate/Client/**'
  pull_request:
    paths:
      - 'src/Articulate/Client/**'

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/Articulate/Client

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Restore .NET tools
      run: dotnet tool restore

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        cache-dependency-path: 'src/Articulate/Client/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Type check
      run: npm run check

    - name: Build
      run: npm run build