name: Articulate Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_File: src\Articulate.sln
      Release_Folder: build\Release
      Build_Folder: build
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup NBGV
        uses: dotnet/nbgv@master
        with:
          setAllVars: true

      - name: Log Build Context
        shell: pwsh
        run: |
          Write-Host "Articulate Build Context"
          Write-Host "Version: $env:NBGV_SemVer2"
          Write-Host "Commit: $env:NBGV_GitCommitIdShort"
          Write-Host "Date: $env:NBGV_GitCommitDate"

      - name: Validate Git Tag
        continue-on-error: true
        shell: pwsh
        run: |
          $tagOutput = git describe --tags --exact-match 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Git tag found."
          } else {
            Write-Host "Git tag missing, release build may not be traceable."
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version-file: "src/Articulate.Web/Client/.node-version"
          cache: "pnpm"
          cache-dependency-path: "src/Articulate.Web/Client/pnpm-lock.yaml"

      - name: Resolve pnpm store path
        id: pnpm-cache
        shell: pwsh
        run: |
          $path = pnpm store path
          echo "path=$path" >> $env:GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('src/Articulate.Web/Client/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.308
            10.0.101

      - name: Run build pipeline script
        shell: pwsh
        run: ./build/build.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Articulate.${{ env.NBGV_SemVer2 }}
          path: ${{ env.Release_Folder }}/Articulate.*
